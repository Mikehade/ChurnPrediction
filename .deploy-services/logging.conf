[loggers]
keys=root,uvicorn,uvicorn.access

[logger_root]
level=INFO
handlers=consoleHandler

[logger_uvicorn]
level=WARNING
handlers=consoleHandler
qualname=uvicorn

[logger_uvicorn.access]
level=WARNING
handlers=consoleHandler
qualname=uvicorn.access

[handlers]
keys=consoleHandler

[formatters]
keys=verboseFormatter

[handler_consoleHandler]
class=StreamHandler
level=DEBUG
formatter=verboseFormatter
args=(sys.stdout,)

[formatter_verboseFormatter]
format=[%(asctime)s] [%(process)d] [%(levelname)s] [%(thread)d] [%(processName)s %(threadName)s] ========>> %(message)s
datefmt=%Y-%m-%d %H:%M:%S %z
